<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link 
    href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
    rel="stylesheet"
  />
  <link 
    rel="stylesheet" 
    href="style.css" 
    media="screen" 
    charset="utf-8"
  />
</head>
<body class="page">
  <header class="add-info">
    <img src="./eisenhower-matrix.jpg" alt="Eisenhower Matrix">
    <a 
      class="more_info" 
      href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </header>
  
  <main class="main-content">
    <section id="add-to-list">
      <h2 class="new-add">Add Item</h2>
      <div class="task-row">
        <input 
          type="text" 
          class="task"
        />
        <button class="add">Add</button>
      </div>
    </section>

    <section>
      <h3 class="todo">Todo</h3>
      <ul id="incomplete-tasks">
        <li class="mode">
          <input type="checkbox" class="input-checkbox">
          <label class="new-task">Pay Bills</label>
          <input 
            type="text" 
            class="task"
          >
          <button class="edit">Edit</button>
          <button class="delete">
            <img src="./remove.svg">
          </button>
        </li>
        <li class="mode edit-mode">
          <input type="checkbox" class="input-checkbox">
          <label class="new-task">Go Shopping</label>
          <input 
            type="text" 
            value="Go Shopping"
            class="task"
          />
          <button class="edit">Save</button>
          <button class="delete">
            <img src="./remove.svg">
          </button>
        </li>
      </ul>
    </section>
  
    <section>
      <h3 class="completed">Completed</h3>
      <ul id="completed-tasks">
        <li class="mode completed-mode">
          <input type="checkbox" checked class="input-checkbox">
          <label class="new-task">See the Doctor</label>
          <input 
            type="text" 
            class="task"
          />
          <button class="edit">Edit</button>
          <button class="delete">
            <img src="./remove.svg">
          </button>
        </li>
      </ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
