<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link 
    href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
    rel="stylesheet"
  />
  <link 
    rel="stylesheet" 
    href="style.css" 
    media="screen" 
    charset="utf-8"
  />
</head>
<body class="page">
  <header class="header">
    <img 
      class="header__image"
      src="./eisenhower-matrix.jpg" 
      alt="Eisenhower  Matrix">
    <a 
      class="header__link" 
      href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </header>
  
  <main class="main">
    <section id="add-task">
      <h2 class="add-task__title">Add Item</h2>
      <div class="add-task__input-row">
        <input 
          type="text" 
          class="add-task__input"
        />
        <button class="add-task__button">Add</button>
      </div>
    </section>

    <section class="task-list">
      <h3 class="task-list__title">Todo</h3>
      <ul id="task-list__incomplete">
        <li class="task-list__mode">
          <input type="checkbox" class="task-list__checkbox">
          <label class="task-list__label">Pay Bills</label>
          <input 
            type="text" 
            class="add-task__input"
          >
          <button class="task-list__edit">Edit</button>
          <button class="task-list__delete">
            <img src="./remove.svg" alt="Remove">
          </button>
        </li>
        <li class="task-list__mode task-list__edit-mode">
          <input type="checkbox" class="task-list__checkbox">
          <label class="task-list__label">Go Shopping</label>
          <input 
            type="text" 
            value="Go Shopping"
            class="add-task__input"
          />
          <button class="task-list__edit">Save</button>
          <button class="task-list__delete">
            <img src="./remove.svg" alt="Remove">
          </button>
        </li>
      </ul>
    </section>
  
    <section class="task-list">
      <h3 class="task-list__title">Completed</h3>
      <ul id="task-list__completed">
        <li class="task-list__mode task-list__completed-mode">
          <input type="checkbox" checked class="task-list__checkbox">
          <label class="task-list__label">See the Doctor</label>
          <input 
            type="text" 
            class="add-task__input"
          />
          <button class="task-list__edit">Edit</button>
          <button class="task-list__delete">
            <img src="./remove.svg" alt="Remove">
          </button>
        </li>
      </ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
