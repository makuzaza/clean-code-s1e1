<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link 
    href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
    rel="stylesheet"
  />
  <link 
    rel="stylesheet" 
    href="style.css" 
    media="screen" 
    charset="utf-8"
  />
</head>
<body>
  <div class="page">
    <div class="aaa">
      <img src="./eisenhower-matrix.jpg" alt="Eisenhower Matrix">
      <a 
          class="more_inf" 
          href="https://goal-life.com/page/method/matrix-eisenhower">
          Want more details?
      </a>
    </div>
  
    <div class="centered-main-page-element">
      <div id="topSectionForAddingElementToList">
        <label class="new-add">Add Item</label>
        <div class="task-row-wrapper">
          <input 
            id="new-task"
            type="text" 
            class="task"
          />
          <button class="add">Add</button>
        </div>
      </div>
  
      <h3 class="todo">Todo</h3>
      <ul id="incompleteTasks">
        <li class="mode">
          <input type="checkbox" class="inputCheckbox">
          <label class="new-task">Pay Bills</label>
          <input 
            id="new-task"
            type="text" 
            class="task"
          >
          <button class="edit">Edit</button>
          <button class="delete">
            <img src="./remove.svg">
          </button>
        </li>
        <li class="mode editMode">
          <input type="checkbox" class="inputCheckbox">
          <label class="new-task">Go Shopping</label>
          <input 
            id="new-task" 
            type="text" 
            value="Go Shopping"
            class="task"
          />
          <button class="edit">Save</button>
          <button class="delete">
            <img src="./remove.svg">
          </button>
        </li>
      </ul>
  
      <h3 class="completed">Completed</h3>
      <ul id="completed-tasks">
        <li class="mode completedMode">
          <input type="checkbox" checked class="inputCheckbox">
          <label class="new-task">See the Doctor</label>
          <input 
            id="new-task" 
            type="text" 
            class="task"
          />
          <button class="edit">Edit</button>
          <button class="delete">
            <img src="./remove.svg">
          </button>
        </li>
      </ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
